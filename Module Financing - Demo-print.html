<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Module Financing — Skenario Demo (Print)</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Print preview: render flat, no chrome, page-break friendly */
    html, body { overflow: visible !important; height: auto !important; background: #fff !important; }
    .app { display: block !important; height: auto !important; overflow: visible !important; }

    /* Hide app chrome */
    .rail, .panel, .header, .tweaks-panel, .tweaks-fab, [class*="Tweak"] { display: none !important; }

    .main { display: block !important; height: auto !important; overflow: visible !important; }
    .page {
      padding: 0 !important;
      overflow: visible !important;
      background: #fff !important;
      height: auto !important;
    }

    /* Cards become flat — no border, page-break aware */
    .card {
      border: none !important;
      background: #fff !important;
      padding: 16px 24px !important;
      margin: 0 0 12px 0 !important;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .card + .card { margin-top: 0 !important; }

    /* Section anchors: try to keep them together */
    .scenario, .sitemap__group, .stat, .hl-card, .tbl-wrap, .approval-banner {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Force every top-level card to its own page for clarity */
    h2.page__title { break-before: page; page-break-before: always; }
    h2.page__title:first-of-type { break-before: auto; page-break-before: auto; }

    /* Tables print friendly */
    .tbl thead { display: table-header-group; }
    .tbl tr { page-break-inside: avoid; }
    .tbl-pagination, .tbl-toolbar { display: none !important; }
    .tbl-wrap { border: 1px solid #D1D5DB !important; }

    /* Flow diagrams: wrap onto multiple lines for print */
    .flow {
      flex-wrap: wrap !important;
      overflow-x: visible !important;
      gap: 12px !important;
    }
    .flow__node {
      flex: 0 0 auto !important;
      min-width: 160px;
      max-width: 200px;
    }

    /* Stats: keep responsive */
    .stats {
      grid-template-columns: repeat(4, 1fr) !important;
    }

    /* No interaction styles in print */
    button { cursor: default !important; }

    /* Print-specific overrides */
    @page {
      size: A3 portrait;
      margin: 12mm;
    }
    @media print {
      html, body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .card {
        padding: 8px 0 !important;
      }
      .scenario, .stat, .tbl-wrap, .hl-card {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }
      .modal-overlay, .tweaks-panel, .tweaks-fab { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="assets/icons.js"></script>
  <script src="data.js"></script>

  <script type="text/babel" src="assets/tweaks-panel.jsx"></script>
  <script type="text/babel" src="forms.jsx"></script>
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens-overview.jsx"></script>
  <script type="text/babel" src="screens-simulasi.jsx"></script>
  <script type="text/babel" src="screens-fasilitas.jsx"></script>
  <script type="text/babel" src="screens-fasilitas-actions.jsx"></script>
  <script type="text/babel" src="screens-pembiayaan.jsx"></script>
  <script type="text/babel" src="screens-pembiayaan-detail.jsx"></script>
  <script type="text/babel" src="screens-registrasi-pembiayaan-landing.jsx"></script>
  <script type="text/babel" src="screens-registrasi-pembiayaan-parts.jsx"></script>
  <script type="text/babel" src="screens-registrasi-pembiayaan.jsx"></script>
  <script type="text/babel" src="screens-transaksi.jsx"></script>
  <script type="text/babel" src="screens-jaminan.jsx"></script>
  <script type="text/babel" src="screens-produk-fasilitas.jsx"></script>
  <script type="text/babel" src="screens-laporan.jsx"></script>
  <script type="text/babel" src="screens-misc.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    // Wait for app mount + fonts + a small buffer before printing
    (async function autoPrint() {
      // Wait for the React app to mount
      const waitForRoot = () => new Promise((resolve) => {
        const check = () => {
          if (document.querySelector('.app .card')) resolve();
          else setTimeout(check, 100);
        };
        check();
      });
      await waitForRoot();
      // Wait for fonts to be ready
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
      // Safety delay for any pending React effects / images
      await new Promise(r => setTimeout(r, 700));
      window.print();
    })();
  </script>
</body>
</html>
